name: Download VoiceFixer Model

on:
  workflow_dispatch:

jobs:
  download-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Clone VoiceFixer model repo from HuggingFace
        run: |
          git clone https://huggingface.co/haoheliu/voicefixer model

      - name: Zip the model folder
        run: |
          zip -r voicefixer_model.zip model

      - name: Upload artifact (v4)
        uses: actions/upload-artifact@v4
        with:
          name: voicefixer_model
          path: voicefixer_model.zip
