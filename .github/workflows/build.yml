name: Test CTranslate2 GPU Build

on:
  workflow_dispatch:

jobs:
  build-gpu:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: VS Build Environment
        uses: egor-tensin/vs-shell@v2

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.17
        with:
          cuda: "11.8.0"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel scikit-build-core pybind11

      - name: Clone CTranslate2
        run: |
          git clone https://github.com/OpenNMT/CTranslate2.git
          cd CTranslate2
          git submodule update --init --recursive

      - name: Build Wheel
        run: |
          cd CTranslate2
          python -m pip wheel . -w dist --verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctranslate2-wheel
          path: CTranslate2/dist/*.whl
