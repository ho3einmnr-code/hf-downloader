name: Test CTranslate2 GPU Build (Py3.12 + Win + CUDA 11.8)

on:
  workflow_dispatch:

jobs:
  build-gpu:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Visual Studio Build Tools
        uses: egor-tensin/vs-shell@v2

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v1

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Install CUDA Toolkit 11.8
        uses: Jimver/cuda-toolkit@v0.2.17
        with:
          cuda: "11.8"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel scikit-build-core pybind11

      - name: Clone CTranslate2
        run: |
          git clone https://github.com/OpenNMT/CTranslate2.git
          cd CTranslate2
          git submodule update --init --recursive

      - name: Build CTranslate2 (GPU-enabled)
        run: |
          cd CTranslate2
          python -m pip wheel . -w dist --verbose

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ctranslate2-gpu-py312-test
          path: CTranslate2/dist/*.whl
