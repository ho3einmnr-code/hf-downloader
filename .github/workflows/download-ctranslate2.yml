name: Test CTranslate2 Wheels (Win + CUDA11)

on:
  workflow_dispatch:

jobs:
  fetch-wheels:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y jq curl zip

      - name: Create output directory
        run: mkdir wheels

      - name: Fetch latest release data
        run: |
          curl -s https://api.github.com/repos/OpenNMT/CTranslate2/releases/latest > release.json

