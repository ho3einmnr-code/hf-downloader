name: Find CTranslate2 Wheels

on:
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt update && sudo apt install -y jq curl zip

      - name: Prepare folder
        run: mkdir -p wheels

      - name: Fetch releases
        run: |
          curl -s https://api.github.com/repos/OpenNMT/CTranslate2/releases?per_page=100 > releases.json

      - name: Extract Windows wheels
        run: |
          jq -r '.[].assets[].browser_download_url' releases.json \
          | grep -Ei '\.whl$' \
          | grep -Ei 'win_amd64' \
          | grep -Ei 'cp3(10|11|12)' \
          > wheels.txt || true

          echo "Found wheels:"
          cat wheels.txt || true

      - name: Download wheels
        run: |
          if [ -s wheels.txt ]; then
            while read url; do
              file=$(basename "$url")
              echo "Downloading $file"
              curl -L "$url" -o "wheels/$file"
            done < wheels.txt
          else
            echo "No wheels found."
          fi

      - name: Show files
        run: ls -lh wheels || true

      - name: Zip wheels
        run: zip -r wheels_result.zip wheels || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctranslate2-wheels
          path: wheels_result.zip
