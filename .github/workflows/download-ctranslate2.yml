name: Find CTranslate2 Wheels

on:
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt update && sudo apt install -y jq curl zip

      - name: Create folder
        run: mkdir wheels

      - name: Fetch releases
        run: |
          curl -s "https://api.github.com/repos/OpenNMT/CTranslate2/releases?per_page=20" > releases.json

      - name: Extract wheel URLs
        run: |
          jq -r '.[].assets[].browser_download_url' releases.json > urls.txt
          grep -i win urls.txt > win.txt || true
          grep -Ei 'cp310|cp312' win.txt > py.txt || true
          grep -Ei 'cu11|cuda11|cu118|cuda-11' py.txt > final.txt || true
          echo "Matched files:"
          cat final.txt || true

      - name: Download wheels
        run: |
          if [ -s final.txt ]; then
            while read url; do
              echo "Downloading $url"
              curl -L "$url" -o wheels/$(basename "$url")
            done < final.txt
          else
            echo "No compatible wheels found."
          fi

      - name: List files
        run: ls -lah wheels || true

      - name: Zip result
        run: |
          zip -r wheels_result.zip wheels || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheels_result.zip
