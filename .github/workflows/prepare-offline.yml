name: Build Full Flutter Offline Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'

      - name: Create Temp Flutter Project
        run: |
          flutter create temp_app
          cd temp_app
          flutter pub get
          flutter build apk --release

      - name: Archive Offline Bundle
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-offline-bundle
          path: |
            ~/.gradle/
            ~/.android/
            /opt/hostedtoolcache/flutter/
