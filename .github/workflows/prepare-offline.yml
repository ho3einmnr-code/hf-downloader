name: Prepare Gradle Dependencies Offline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x' # یا نسخه فلاتر پروژه شما

      - name: Use specific Gradle version
        run: |
          sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.14-all.zip#' android/gradle/wrapper/gradle-wrapper.properties

      - name: Get dependencies & build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Archive Gradle dependencies
        uses: actions/upload-artifact@v4
        with:
          name: gradle-cache-full
          path: |
            ~/.gradle/
            ~/.android/
          if-no-files-found: error
