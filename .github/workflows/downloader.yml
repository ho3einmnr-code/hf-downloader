name: Download OpenVPN Community

on:
  workflow_dispatch:

jobs:
  download-openvpn:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl grep

      - name: Get latest OpenVPN Windows ZIP link
        id: get_link
        run: |
          PAGE=$(curl -s https://openvpn.net/index.php/download/community-downloads.html)

          ZIP_URL=$(echo "$PAGE" | \
            grep -oP 'https://[^\"]+\.zip' | \
            head -n 1)

          echo "Found URL: $ZIP_URL"
          echo "zip_url=$ZIP_URL" >> $GITHUB_OUTPUT

      - name: Download ZIP
        run: |
          curl -L "${{ steps.get_link.outputs.zip_url }}" -o openvpn.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-zip
          path: openvpn.zip
